<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wanderly - Login</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary-purple: #4c1d95;  
            --accent-amber: #d97706;     
            --bg-soft: #f5f3ff;        
            --text-dark: #1e1b4b;        
            --text-muted: #6b7280;     
            --white: #ffffff;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; }
        body { background-color: var(--bg-soft); color: var(--text-dark); min-height: 100vh; display: flex; flex-direction: column; }
        .container { max-width: 1200px; margin: 0 auto; width: 100%; padding: 0 24px; }
        
        nav { display: flex; justify-content: space-between; align-items: center; padding: 20px 0; width: 100%; }
        .logo { font-size: 26px; font-weight: 700; color: var(--primary-purple); display: flex; align-items: center; gap: 10px; text-decoration: none; }
        .nav-links { display: flex; list-style: none; gap: 40px; }
        .nav-links li a { text-decoration: none; color: var(--text-dark); font-weight: 600; font-size: 16px; transition: color 0.2s ease; }
        .nav-links li a:hover { color: var(--primary-purple); }
        .nav-login-btn { text-decoration: none; background-color: var(--primary-purple); color: var(--white); border: 2px solid var(--primary-purple); padding: 10px 24px; border-radius: 10px; font-weight: 600; font-size: 15px; cursor: pointer; }

        .login-wrapper { flex: 1; display: flex; justify-content: center; align-items: center; padding: 40px 0; }
        .login-card { background-color: var(--white); width: 100%; max-width: 960px; min-height: 540px; border-radius: 24px; overflow: hidden; box-shadow: 0 20px 40px rgba(76, 29, 149, 0.07); display: grid; grid-template-columns: 1fr 1.1fr; }
        .login-banner { position: relative; background: linear-gradient(rgba(46, 16, 101, 0.35), rgba(46, 16, 101, 0.45)), url('https://images.unsplash.com/photo-1527631746610-bca00a040d60?q=80&w=600&auto=format&fit=crop') center/cover; padding: 45px; display: flex; flex-direction: column; justify-content: space-between; color: var(--white); }
        .banner-logo i { font-size: 28px; color: var(--white); }
        .banner-text h2 { font-size: 38px; font-weight: 700; line-height: 1.2; margin-bottom: 15px; }
        .banner-text p { font-size: 15px; line-height: 1.6; opacity: 0.9; }
        
        .login-form-container { padding: 50px 60px; display: flex; flex-direction: column; justify-content: center; }
        .form-header h3 { font-size: 32px; font-weight: 700; color: var(--text-dark); margin-bottom: 8px; }
        .form-header p { font-size: 15px; color: var(--text-muted); margin-bottom: 35px; }
        .input-group { margin-bottom: 22px; }
        .input-group label { display: block; font-size: 14px; font-weight: 600; color: var(--text-dark); margin-bottom: 8px; }
        .input-group input { width: 100%; padding: 14px 16px; border: 1px solid #e2e8f0; border-radius: 12px; font-size: 15px; outline: none; background-color: #fafafa; transition: all 0.2s ease; }
        .input-group input:focus { border-color: var(--primary-purple); background-color: var(--white); box-shadow: 0 0 0 4px rgba(76, 29, 149, 0.05); }
        
        .form-options { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; font-size: 14px; }
        .remember-me { display: flex; align-items: center; gap: 8px; color: var(--text-muted); cursor: pointer; font-weight: 500; }
        .remember-me input { width: 16px; height: 16px; accent-color: var(--primary-purple); cursor: pointer; }
        .forgot-pass { color: var(--primary-purple); text-decoration: none; font-weight: 600; transition: color 0.2s; }
        .forgot-pass:hover { color: var(--accent-amber); }
        
        .submit-btn { width: 100%; background-color: var(--primary-purple); color: var(--white); border: none; padding: 15px; border-radius: 12px; font-size: 16px; font-weight: 600; cursor: pointer; transition: background 0.2s; margin-bottom: 25px; }
        .submit-btn:hover { background-color: #3b1478; }
        .form-footer { text-align: center; font-size: 14px; color: var(--text-muted); }
        .form-footer a { color: var(--primary-purple); text-decoration: none; font-weight: 700; margin-left: 4px; }
        .form-footer a:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <div class="container">
        <nav>
            <a href="home.html" class="logo"><i class="fa-solid fa-plane-departure"></i> Wanderly</a>
            <ul class="nav-links">
                <li><a href="home.html">Home</a></li>
                <li><a href="about.html">About</a></li>
                <li><a href="explore.html">Explore</a></li>
                <li><a href="contact.html">Contact</a></li>
            </ul>
            <a href="login.html" class="nav-login-btn">Login</a>
        </nav>
    </div>
    
    <div class="login-wrapper">
        <div class="login-card">
            <div class="login-banner">
                <div class="banner-logo"><i class="fa-solid fa-plane"></i></div>
                <div class="banner-text">
                    <h2>Welcome Back!</h2>
                    <p>Login to continue your journey with us and explore the world.</p>
                </div>
            </div>
            <div class="login-form-container">
                <div class="form-header">
                    <h3>Login</h3>
                    <p>Enter your credentials to access your account.</p>
                </div>
                <form onsubmit="event.preventDefault(); alert('Login Confirmed! Returning to Home Panel...'); window.location.href='home.html';">
                    <div class="input-group">
                        <label for="email">Email Address</label>
                        <input type="email" id="email" placeholder="Enter your email" required>
                    </div>
                    <div class="input-group">
                        <label for="password">Password</label>
                        <input type="password" id="password" placeholder="Enter your password" required>
                    </div>
                    <div class="form-options">
                        <label class="remember-me"><input type="checkbox"> Remember Me</label>
                        <a href="#" class="forgot-pass">Forgot Password?</a>
                    </div>
                    <button type="submit" class="submit-btn">Login</button>
                    <div class="form-footer">Don't have an account?<a href="#">Sign Up</a></div>
                </form>
            </div>
        </div>
    </div>
</body>
</html>
